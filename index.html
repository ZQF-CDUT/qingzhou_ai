<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame SVG Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #63ffff 0%, transparent 70%);
            border-radius: 50%;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: 100px;
            right: 100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00fa00 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Frame容器 */
        .frame-container {
            position: absolute;
            left: 30px;
            bottom: 30px;
            width: 1073px;
            height: 32px;
            display: flex;
            align-items: center;
            filter: drop-shadow(0 4px 8px rgba(99, 255, 255, 0.2));
            font-size: 12px;
            font-weight: 500;
        }

        /* 区块通用样式 */
        .frame-section {
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            padding: 0 10px;
            color: #63ffff;
            white-space: nowrap;
        }

        /* 区块1 - 航向艏向 (200px) */
        .section-1 {
            width: 200px;
            padding: 0 8px;
            gap: 12px;
        }

        /* 区块2 - 航速 (139px) */
        .section-2 {
            width: 139px;
            margin-left: 30px;
        }

        /* 区块3 - 坐标 (289px) */
        .section-3 {
            width: 289px;
            margin-left: 31px;
            letter-spacing: 1px;
        }

        /* 区块4 - 位置 (159px) */
        .section-4 {
            width: 159px;
            margin-left: 31px;
        }

        /* 区块5 - 通信状态 (163px) */
        .section-5 {
            width: 163px;
            margin-left: 31px;
            justify-content: space-between;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00fa00;
            border-radius: 50%;
            box-shadow: 0 0 4px #00fa00;
        }

        .icon-box {
            width: 16px;
            height: 16px;
            border: 1.5px solid #63ffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-box::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #63ffff;
            border-radius: 50%;
        }

        .icon-box.square {
            border-radius: 2px;
        }

        .icon-box.square::before {
            width: 8px;
            height: 8px;
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-decoration"></div>
        <div class="frame-container">
            <!-- 区块1: 航向 艏向 -->
            <div class="frame-section section-1">
                <div class="icon-box"></div>
                <div class="icon-box square"></div>
                <span>航向 100° 艏向100°</span>
                <div class="icon-box"></div>
            </div>

            <!-- 区块2: 航速 -->
            <div class="frame-section section-2">
                <span>航速 18km</span>
            </div>

            <!-- 区块3: 坐标 -->
            <div class="frame-section section-3">
                <span>E 116.397467.N 39.908739</span>
            </div>

            <!-- 区块4: 位置 -->
            <div class="frame-section section-4">
                <span>湖北省武汉市</span>
            </div>

            <!-- 区块5: 通信状态 -->
            <div class="frame-section section-5">
                <span>通信状态 正常</span>
                <div class="status-dot"></div>
            </div>
        </div>
    </div>
</body>
</html>
